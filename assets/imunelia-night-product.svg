<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 853" width="1280" height="853" role="img" aria-labelledby="title desc">
  <title id="title">Imunelia Night product packaging</title>
  <desc id="desc">Luxury ivory and navy Imunelia Night packaging with gold typography and night rhythm symbol.</desc>
  <defs>
    <linearGradient id="ivory" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset=".55" stop-color="#f7f0e5"/><stop offset="1" stop-color="#ece0ce"/></linearGradient>
    <linearGradient id="navy" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#061b38"/><stop offset=".62" stop-color="#082b55"/><stop offset="1" stop-color="#04152e"/></linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#8b5f18"/><stop offset=".18" stop-color="#c99b3d"/><stop offset=".42" stop-color="#f0d48a"/><stop offset=".68" stop-color="#b98222"/><stop offset="1" stop-color="#d7b56d"/></linearGradient>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#302b63"/><stop offset=".42" stop-color="#082b55"/><stop offset=".74" stop-color="#d7b56d"/><stop offset="1" stop-color="#9a6a1d"/></linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#082b55" flood-opacity=".18"/></filter>
    <filter id="goldEmboss" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#fff7d9" flood-opacity=".85"/><feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#5c3d0f" flood-opacity=".25"/><feDropShadow dx="0" dy="-1" stdDeviation=".6" flood-color="#5f3f10" flood-opacity=".42"/></filter>
    <pattern id="microdots" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="1.4" cy="1.4" r=".9" fill="#c8a24a" opacity=".34"/></pattern>
    <mask id="moon"><rect width="260" height="260" fill="black"/><circle cx="112" cy="126" r="78" fill="white"/><circle cx="146" cy="98" r="78" fill="black"/></mask>
  </defs>
  <rect width="1280" height="853" fill="#f7f4ee"/>
  <ellipse cx="650" cy="780" rx="520" ry="38" fill="#082b55" opacity=".12"/>
  <g filter="url(#softShadow)">
    <rect x="120" y="82" width="170" height="690" rx="4" fill="url(#navy)"/>
    <rect x="290" y="82" width="870" height="690" rx="7" fill="url(#ivory)"/>
    <rect x="290" y="82" width="870" height="690" rx="7" fill="none" stroke="#d8c18a" stroke-opacity=".62"/>
    <path d="M290 82 L268 104 L268 754 L290 772 Z" fill="#03162f" opacity=".85"/>
    <path d="M120 82 L142 62 L1138 62 L1160 82 Z" fill="#fffaf0" opacity=".72"/>
  </g>
  <g opacity=".43">
    <path d="M340 520 C486 458 610 548 742 498 C858 454 978 506 1110 462" fill="none" stroke="url(#microdots)" stroke-width="68" stroke-linecap="round"/>
    <path d="M152 650 C190 605 230 604 274 620" fill="none" stroke="#c8a24a" stroke-width="2" opacity=".45"/>
    <path d="M150 675 C196 625 235 628 282 646" fill="none" stroke="#c8a24a" stroke-width="2" opacity=".34"/>
    <path d="M150 700 C202 648 240 656 288 674" fill="none" stroke="#c8a24a" stroke-width="2" opacity=".26"/>
  </g>
  <g transform="translate(178 122)">
    <circle cx="28" cy="28" r="27" fill="none" stroke="#f7f3e8" stroke-width="4"/>
    <path d="M42 6 C55 18 49 34 32 48" fill="none" stroke="#d7b56d" stroke-width="4" stroke-linecap="round"/>
    <text x="28" y="102" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">EVENING.</text>
    <text x="28" y="136" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">QUIET.</text>
    <text x="28" y="170" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">NIGHT</text>
    <text x="28" y="204" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">RHYTHM.</text>
  </g>
  <g transform="translate(890 134)">
    <path d="M33 6 C50 17 49 40 29 52" fill="none" stroke="#d7b56d" stroke-width="4" stroke-linecap="round"/>
    <circle cx="28" cy="30" r="28" fill="none" stroke="#082b55" stroke-width="4"/>
    <text x="92" y="56" fill="#082b55" font-family="Georgia, 'Times New Roman', serif" font-size="46">Imunelia</text>
    <text x="142" y="86" fill="#c8a24a" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="8">BIOTECH</text>
  </g>
  <text x="350" y="362" fill="url(#gold)" filter="url(#goldEmboss)" font-family="Georgia, 'Times New Roman', serif" font-size="126" font-weight="400">Night</text>
  <text x="354" y="414" fill="#6b5532" font-family="Arial, sans-serif" font-size="30" letter-spacing="2">Noční rytmus, večerní klid a obnova</text>
  <g transform="translate(792 430)" filter="url(#softShadow)">
    <circle cx="112" cy="126" r="78" fill="url(#night)" mask="url(#moon)"/>
    <path d="M186 164 C232 184 286 172 326 132" fill="none" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
    <circle cx="270" cy="72" r="14" fill="url(#gold)"/>
    <path d="M320 48 L329 70 L352 78 L330 88 L322 111 L312 89 L290 81 L312 70 Z" fill="url(#gold)"/>
  </g>
  <line x1="350" y1="686" x2="1100" y2="686" stroke="#c8a24a" stroke-width="2" opacity=".62"/>
  <g fill="none" stroke="#c8a24a" stroke-width="2"><circle cx="418" cy="730" r="26"/><path d="M411 726 L419 739 L430 716"/><circle cx="790" cy="730" r="26"/></g>
  <text x="458" y="739" fill="#102033" font-family="Arial, sans-serif" font-size="23">Doplněk stravy</text>
  <text x="790" y="739" text-anchor="middle" fill="#b88928" font-family="Georgia, 'Times New Roman', serif" font-size="35">10</text>
  <text x="840" y="739" fill="#102033" font-family="Arial, sans-serif" font-size="23">podjazykových tablet</text>
  <rect x="500" y="767" width="520" height="8" fill="url(#gold)"/><rect x="290" y="767" width="210" height="8" fill="#082b55"/><rect x="1020" y="767" width="140" height="8" fill="#082b55"/>
</svg>
