<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 853" width="1280" height="853" role="img" aria-labelledby="title desc">
  <title id="title">Imunelia Balance product packaging</title>
  <desc id="desc">Luxury ivory and navy Imunelia Balance packaging with gold typography, infinity symbol and ball.</desc>
  <defs>
    <linearGradient id="ivory" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.55" stop-color="#f7f0e5"/>
      <stop offset="1" stop-color="#ece0ce"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#061b38"/>
      <stop offset="0.62" stop-color="#082b55"/>
      <stop offset="1" stop-color="#04152e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5f18"/>
      <stop offset="0.18" stop-color="#c99b3d"/>
      <stop offset="0.42" stop-color="#f0d48a"/>
      <stop offset="0.68" stop-color="#b98222"/>
      <stop offset="1" stop-color="#d7b56d"/>
    </linearGradient>
    <linearGradient id="blueGold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#082b55"/>
      <stop offset="0.30" stop-color="#082b55"/>
      <stop offset="0.42" stop-color="#d7b56d"/>
      <stop offset="0.55" stop-color="#805717"/>
      <stop offset="0.72" stop-color="#d7b56d"/>
      <stop offset="1" stop-color="#c8a24a"/>
    </linearGradient>
    <radialGradient id="ball" cx="34%" cy="24%" r="78%">
      <stop offset="0" stop-color="#fff6d5"/>
      <stop offset="0.42" stop-color="#d9b45e"/>
      <stop offset="1" stop-color="#865915"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#082b55" flood-opacity="0.18"/>
    </filter>
    <filter id="goldEmboss" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#fff7d9" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#5c3d0f" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="0.6" flood-color="#5f3f10" flood-opacity="0.42"/>
    </filter>
    <pattern id="microdots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="0.9" fill="#c8a24a" opacity="0.34"/>
    </pattern>
  </defs>

  <rect width="1280" height="853" fill="#f7f4ee"/>
  <ellipse cx="650" cy="780" rx="520" ry="38" fill="#082b55" opacity="0.12"/>
  <g filter="url(#softShadow)">
    <rect x="120" y="82" width="170" height="690" rx="4" fill="url(#navy)"/>
    <rect x="290" y="82" width="870" height="690" rx="7" fill="url(#ivory)"/>
    <rect x="290" y="82" width="870" height="690" rx="7" fill="none" stroke="#d8c18a" stroke-opacity="0.62"/>
    <path d="M290 82 L268 104 L268 754 L290 772 Z" fill="#03162f" opacity="0.85"/>
    <path d="M120 82 L142 62 L1138 62 L1160 82 Z" fill="#fffaf0" opacity="0.72"/>
  </g>

  <g opacity="0.45">
    <path d="M340 520 C480 460 600 545 730 500 C850 458 960 500 1110 458" fill="none" stroke="url(#microdots)" stroke-width="68" stroke-linecap="round"/>
    <path d="M152 650 C190 605 230 604 274 620" fill="none" stroke="#c8a24a" stroke-width="2" opacity="0.45"/>
    <path d="M150 675 C196 625 235 628 282 646" fill="none" stroke="#c8a24a" stroke-width="2" opacity="0.34"/>
    <path d="M150 700 C202 648 240 656 288 674" fill="none" stroke="#c8a24a" stroke-width="2" opacity="0.26"/>
  </g>

  <g transform="translate(178 122)">
    <circle cx="28" cy="28" r="27" fill="none" stroke="#f7f3e8" stroke-width="4"/>
    <path d="M42 6 C55 18 49 34 32 48" fill="none" stroke="#d7b56d" stroke-width="4" stroke-linecap="round"/>
    <text x="28" y="102" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">VNITŘNÍ</text>
    <text x="28" y="136" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">ROVNOVÁHA.</text>
    <text x="28" y="170" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">KLID</text>
    <text x="28" y="204" text-anchor="middle" fill="#d7b56d" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">UVNITŘ.</text>
  </g>

  <g transform="translate(890 134)">
    <path d="M33 6 C50 17 49 40 29 52" fill="none" stroke="#d7b56d" stroke-width="4" stroke-linecap="round"/>
    <circle cx="28" cy="30" r="28" fill="none" stroke="#082b55" stroke-width="4"/>
    <text x="92" y="56" fill="#082b55" font-family="Georgia, 'Times New Roman', serif" font-size="46">Imunelia</text>
    <text x="142" y="86" fill="#c8a24a" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="8">BIOTECH</text>
  </g>

  <text x="350" y="362" fill="url(#gold)" filter="url(#goldEmboss)" font-family="Georgia, 'Times New Roman', serif" font-size="126" font-weight="400">Balance</text>
  <text x="354" y="414" fill="#6b5532" font-family="Arial, sans-serif" font-size="30" letter-spacing="2">Vnitřní rovnováha a každodenní rytmus</text>

  <g transform="translate(476 468)">
    <path d="M0 76 C58 -12 143 -20 230 66 C317 152 404 142 460 58 C404 4 318 -18 230 66 C142 150 58 160 0 76" fill="none" stroke="url(#blueGold)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#softShadow)"/>
    <path d="M8 72 C66 6 144 2 230 66 C316 130 396 122 452 60" fill="none" stroke="#fff4c8" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <circle cx="230" cy="20" r="21" fill="url(#ball)" filter="url(#softShadow)"/>
  </g>

  <line x1="350" y1="686" x2="1100" y2="686" stroke="#c8a24a" stroke-width="2" opacity="0.62"/>
  <g fill="none" stroke="#c8a24a" stroke-width="2">
    <circle cx="418" cy="730" r="26"/>
    <path d="M411 726 L419 739 L430 716"/>
    <circle cx="790" cy="730" r="26"/>
  </g>
  <text x="458" y="739" fill="#102033" font-family="Arial, sans-serif" font-size="23">Doplněk stravy</text>
  <text x="790" y="739" text-anchor="middle" fill="#b88928" font-family="Georgia, 'Times New Roman', serif" font-size="35">10</text>
  <text x="840" y="739" fill="#102033" font-family="Arial, sans-serif" font-size="23">podjazykových tablet</text>
  <rect x="500" y="767" width="520" height="8" fill="url(#gold)"/>
  <rect x="290" y="767" width="210" height="8" fill="#082b55"/>
  <rect x="1020" y="767" width="140" height="8" fill="#082b55"/>
</svg>
